<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Lusso</title>
    <meta name="description" content="Lusso Job Management" />

    <!-- Apply dark mode before first paint (mirrors ThemeContext resolve())
         so the loading screen renders the right colour from the first frame -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('lusso_theme') || 'light';
          var h = new Date().getHours();
          var dark =
            t === 'dark' ||
            (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches) ||
            (t === 'schedule' && (h >= 19 || h < 7));
          if (dark) document.documentElement.classList.add('dark');
          var c = localStorage.getItem('lusso_color_theme');
          if (c && c !== 'taupe') document.documentElement.classList.add('theme-' + c);
        } catch (e) { /* first visit / private mode — default light */ }
      })();
    </script>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme colour (browser chrome / status bar) -->
    <meta name="theme-color" content="#174D4D" />

    <!-- iOS home screen icon + standalone mode -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lusso" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.bunny.net" />
    <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
